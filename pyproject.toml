[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "gt-dataslicer"
version = "0.1.0"
description = "Filter very large CSV files with a safe expression DSL and export results to CSV or XLSX."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [
  { name = "GT DataSlicer" }
]
dependencies = [
  "duckdb>=1.1",
  "lark>=1.2",
  "pyyaml>=6.0",
  "rich>=13.7",
  "typer>=0.12",
  "xlsxwriter>=3.2",
]

[project.optional-dependencies]
dev = [
  "openpyxl>=3.1",
  "pytest>=8.2",
  "pytest-cov>=5.0",
]

[project.scripts]
gt-dataslicer = "gt_dataslicer.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/gt_dataslicer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
